<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hortifruti Família</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f9f0;
      color: #2e4a2b;
    }
    header {
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    header p { font-style: italic; margin-top: 5px; opacity: 0.9; }
    nav {
      background: #fff;
      padding: 12px;
      display: flex;
      justify-content: center;
      gap: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      flex-wrap: wrap;
    }
    button, .btn-link {
      background: #e8f5e9;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 1rem;
      color: #2e4a2b;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      text-decoration: none;
    }
    button:hover, .btn-link:hover { background: #c8e6c9; }
    .active-btn { background: #4caf50; color: white; }
    .active-btn:hover { background: #388e3c; }
    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 20px;
    }
    .produtos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-5px); }
    .card .emoji-container {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin: 0 auto 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f7ea;
    }
    .card .emoji-container .emoji {
      font-size: 2.8rem;
    }
    .card .emoji-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card h3 {
      font-size: 1.1rem;
      margin: 5px 0;
      color: #1b5e20;
    }
    .card .preco {
      font-size: 1.3rem;
      font-weight: bold;
      color: #d84315;
      margin: 8px 0;
    }
    .card .categoria {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
    }
    .login-box, .admin-panel {
      background: white;
      padding: 25px;
      border-radius: 20px;
      max-width: 450px;
      margin: 30px auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 1rem;
    }
    .hidden { display: none !important; }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    .admin-table th, .admin-table td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    .admin-table .admin-img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
    .actions button { margin: 0 3px; font-size: 0.8rem; padding: 5px 10px; }
    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 0.9rem;
    }
    .btn-logout { background: #ffab91; color: #bf360c; }
  </style>
</head>
<body>
  <header>
    <h1>🥬 Hortifruti Família 🍅</h1>
    <p>Frescor e qualidade direto do campo para sua mesa</p>
  </header>

  <nav>
    <button id="btn-vitrine-publica" class="active-btn">🏪 Produtos (normal)</button>
    <button id="btn-area-revenda">🔒 Área Revenda</button>
    <button id="admin-btn-nav" style="display:none;">⚙️ Administração</button>
    <button id="btn-logout" class="btn-logout hidden">Sair</button>
  </nav>

  <div class="container">
    <div id="vitrine-container">
      <div id="loading" style="text-align:center; margin:40px;">Carregando produtos...</div>
      <div id="produtos-grid" class="produtos-grid"></div>
    </div>

    <div id="login-container" class="login-box hidden">
      <h2>Área do Revendedor</h2>
      <p>Faça login para ver seus preços exclusivos.</p>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Senha">
      <button id="btn-login">Entrar</button>
      <p id="login-error" style="color:red; margin-top:10px;"></p>
    </div>

    <div id="admin-container" class="hidden">
      <div class="admin-panel">
        <h2>Gerenciar Produtos</h2>
        <input type="text" id="prod-nome" placeholder="Nome do produto">
        <input type="text" id="prod-categoria" placeholder="Categoria (ex: Fruta, Verdura)">
        <input type="number" id="prod-preco-normal" placeholder="Preço normal (R$)" step="0.01">
        <input type="number" id="prod-preco-revenda" placeholder="Preço revenda (R$)" step="0.01">
        <input type="text" id="prod-emoji" placeholder="Emoji (🍎🍌 etc.)">
        <input type="text" id="prod-imagem" placeholder="URL da imagem (opcional)">
        <button id="btn-add-produto">Adicionar Produto</button>
        <p id="admin-msg" style="margin-top:10px;"></p>
      </div>
      <div>
        <h3>Lista de Produtos</h3>
        <table class="admin-table" id="admin-tabela">
          <thead><tr><th>Imagem</th><th>Nome</th><th>Cat.</th><th>Normal</th><th>Revenda</th><th>Ações</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <footer>Hortifruti Família © 2026 | Alimentos frescos todos os dias</footer>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBASbbVZ_AwJ05eULz0-mDF8FmdxqAolHY",
      authDomain: "hortifruti-familia.firebaseapp.com",
      projectId: "hortifruti-familia",
      storageBucket: "hortifruti-familia.firebasestorage.app",
      messagingSenderId: "128267146861",
      appId: "1:128267146861:web:c7082fc30fd5053ac49164"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const vitrineContainer = document.getElementById('vitrine-container');
    const loadingEl = document.getElementById('loading');
    const produtosGrid = document.getElementById('produtos-grid');
    const loginContainer = document.getElementById('login-container');
    const adminContainer = document.getElementById('admin-container');
    const btnVitrinePublica = document.getElementById('btn-vitrine-publica');
    const btnAreaRevenda = document.getElementById('btn-area-revenda');
    const btnAdminNav = document.getElementById('admin-btn-nav');
    const btnLogout = document.getElementById('btn-logout');
    const btnLogin = document.getElementById('btn-login');
    const loginError = document.getElementById('login-error');
    const btnAddProduto = document.getElementById('btn-add-produto');
    const adminMsg = document.getElementById('admin-msg');

    let currentMode = 'publico';
    let editingId = null;

    async function isAdmin(uid) {
      try {
        const doc = await db.collection('admins').doc(uid).get();
        return doc.exists;
      } catch (e) {
        return false;
      }
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const admin = await isAdmin(user.uid);
        btnLogout.classList.remove('hidden');
        if (admin) {
          btnAdminNav.style.display = 'inline-block';
          currentMode = 'admin';
          showAdminPanel();
          carregarAdminProdutos();
        } else {
          btnAdminNav.style.display = 'none';
          currentMode = 'revenda';
          loginContainer.classList.add('hidden');
          showVitrine('revenda');
          carregarProdutos('revenda');
        }
      } else {
        btnAdminNav.style.display = 'none';
        btnLogout.classList.add('hidden');
        currentMode = 'publico';
        loginContainer.classList.add('hidden');
        showVitrine('publico');
        carregarProdutos('publico');
      }
      setActiveNav(currentMode);
    });

    btnVitrinePublica.addEventListener('click', () => {
      if (auth.currentUser) {
        auth.signOut();
      } else {
        currentMode = 'publico';
        showVitrine('publico');
        carregarProdutos('publico');
        setActiveNav('publico');
      }
    });

    btnAreaRevenda.addEventListener('click', () => {
      if (auth.currentUser) {
        if (currentMode === 'admin') {
          alert('Você está como administrador. Saia para acessar a revenda.');
          return;
        }
        currentMode = 'revenda';
        showVitrine('revenda');
        carregarProdutos('revenda');
        setActiveNav('revenda');
      } else {
        loginContainer.classList.remove('hidden');
        vitrineContainer.classList.add('hidden');
        adminContainer.classList.add('hidden');
        setActiveNav('revenda');
      }
    });

    btnAdminNav.addEventListener('click', () => {
      showAdminPanel();
      carregarAdminProdutos();
      setActiveNav('admin');
    });

    btnLogout.addEventListener('click', () => {
      auth.signOut();
    });

    btnLogin.addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await auth.signInWithEmailAndPassword(email, password);
        loginError.textContent = '';
      } catch (error) {
        loginError.textContent = 'Erro: ' + error.message;
      }
    });

    function showVitrine(modo) {
      loginContainer.classList.add('hidden');
      adminContainer.classList.add('hidden');
      vitrineContainer.classList.remove('hidden');
      produtosGrid.innerHTML = '';
      loadingEl.style.display = 'block';
      currentMode = modo;
    }

    function showAdminPanel() {
      vitrineContainer.classList.add('hidden');
      loginContainer.classList.add('hidden');
      adminContainer.classList.remove('hidden');
      currentMode = 'admin';
    }

    function setActiveNav(modo) {
      [btnVitrinePublica, btnAreaRevenda, btnAdminNav].forEach(b => b.classList.remove('active-btn'));
      if (modo === 'publico') btnVitrinePublica.classList.add('active-btn');
      if (modo === 'revenda') btnAreaRevenda.classList.add('active-btn');
      if (modo === 'admin') btnAdminNav.classList.add('active-btn');
    }

    function renderEmojiContainer(emoji, imagem) {
      const container = document.createElement('div');
      container.className = 'emoji-container';
      if (imagem && imagem.trim() !== '') {
        const img = document.createElement('img');
        img.src = imagem;
        img.alt = '';
        container.appendChild(img);
      } else {
        const span = document.createElement('span');
        span.className = 'emoji';
        span.textContent = emoji || '🥬';
        container.appendChild(span);
      }
      return container;
    }

    function carregarProdutos(modo) {
      db.collection('produtos').get().then(snapshot => {
        loadingEl.style.display = 'none';
        produtosGrid.innerHTML = '';
        if (snapshot.empty) {
          produtosGrid.innerHTML = '<p style="text-align:center;">Nenhum produto cadastrado ainda.</p>';
          return;
        }
        snapshot.forEach(doc => {
          const data = doc.data();
          const card = document.createElement('div');
          card.className = 'card';
          card.appendChild(renderEmojiContainer(data.emoji, data.imagem));
          const nome = data.nome || 'Sem nome';
          const categoria = data.categoria || '';
          let preco;
          if (modo === 'revenda') {
            preco = data.precoRevenda ? `R$ ${parseFloat(data.precoRevenda).toFixed(2).replace('.', ',')}` : '—';
          } else {
            preco = data.precoNormal ? `R$ ${parseFloat(data.precoNormal).toFixed(2).replace('.', ',')}` : '—';
          }
          const info = document.createElement('div');
          info.innerHTML = `<h3>${nome}</h3><div class="categoria">${categoria}</div><div class="preco">${preco}</div>`;
          card.appendChild(info);
          produtosGrid.appendChild(card);
        });
      }).catch(err => {
        loadingEl.textContent = 'Erro ao carregar.';
        console.error(err);
      });
    }

    function carregarAdminProdutos() {
      const tbody = document.querySelector('#admin-tabela tbody');
      tbody.innerHTML = '<tr><td colspan="6">Carregando...</td></tr>';
      db.collection('produtos').get().then(snapshot => {
        tbody.innerHTML = '';
        if (snapshot.empty) {
          tbody.innerHTML = '<tr><td colspan="6">Nenhum produto.</td></tr>';
          return;
        }
        snapshot.forEach(doc => {
          const data = doc.data();
          const id = doc.id;
          const tr = document.createElement('tr');
          let imagemCelula;
          if (data.imagem && data.imagem.trim() !== '') {
            imagemCelula = `<img class="admin-img" src="${data.imagem}" alt="">`;
          } else {
            imagemCelula = `<span style="font-size:1.8rem;">${data.emoji || '🥬'}</span>`;
          }
          tr.innerHTML = `
            <td>${imagemCelula}</td>
            <td>${data.nome || ''}</td>
            <td>${data.categoria || ''}</td>
            <td>R$ ${data.precoNormal ? parseFloat(data.precoNormal).toFixed(2).replace('.', ',') : ''}</td>
            <td>R$ ${data.precoRevenda ? parseFloat(data.precoRevenda).toFixed(2).replace('.', ',') : ''}</td>
            <td class="actions">
              <button class="editar" data-id="${id}">✏️</button>
              <button class="excluir" data-id="${id}">🗑️</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
        document.querySelectorAll('.excluir').forEach(btn => {
          btn.addEventListener('click', excluirProduto);
        });
        document.querySelectorAll('.editar').forEach(btn => {
          btn.addEventListener('click', prepararEdicao);
        });
      });
    }

    // Função que decide se adiciona ou atualiza
    async function handleSubmitProduto() {
      const nome = document.getElementById('prod-nome').value.trim();
      const categoria = document.getElementById('prod-categoria').value.trim();
      const precoNormal = parseFloat(document.getElementById('prod-preco-normal').value);
      const precoRevenda = parseFloat(document.getElementById('prod-preco-revenda').value);
      const emoji = document.getElementById('prod-emoji').value.trim();
      const imagem = document.getElementById('prod-imagem').value.trim();

      if (!nome || isNaN(precoNormal) || isNaN(precoRevenda)) {
        adminMsg.textContent = 'Preencha nome e preços corretamente.';
        return;
      }

      const produtoData = { nome, categoria, precoNormal, precoRevenda, emoji, imagem };

      try {
        if (editingId) {
          // Atualizar
          await db.collection('produtos').doc(editingId).update(produtoData);
          adminMsg.textContent = 'Produto atualizado!';
        } else {
          // Adicionar
          await db.collection('produtos').add(produtoData);
          adminMsg.textContent = 'Produto adicionado!';
        }
        resetFormulario();
        carregarAdminProdutos();
      } catch (err) {
        adminMsg.textContent = 'Erro: ' + err.message;
      }
    }

    btnAddProduto.addEventListener('click', handleSubmitProduto);

    function resetFormulario() {
      document.getElementById('prod-nome').value = '';
      document.getElementById('prod-categoria').value = '';
      document.getElementById('prod-preco-normal').value = '';
      document.getElementById('prod-preco-revenda').value = '';
      document.getElementById('prod-emoji').value = '';
      document.getElementById('prod-imagem').value = '';
      editingId = null;
      btnAddProduto.textContent = 'Adicionar Produto';
    }

    async function excluirProduto(e) {
      const id = e.target.dataset.id;
      if (!confirm('Tem certeza que deseja excluir?')) return;
      try {
        await db.collection('produtos').doc(id).delete();
        carregarAdminProdutos();
      } catch (err) {
        alert('Erro ao excluir: ' + err.message);
      }
    }

    async function prepararEdicao(e) {
      const id = e.target.dataset.id;
      try {
        const doc = await db.collection('produtos').doc(id).get();
        if (!doc.exists) return;
        const data = doc.data();
        document.getElementById('prod-nome').value = data.nome || '';
        document.getElementById('prod-categoria').value = data.categoria || '';
        document.getElementById('prod-preco-normal').value = data.precoNormal || '';
        document.getElementById('prod-preco-revenda').value = data.precoRevenda || '';
        document.getElementById('prod-emoji').value = data.emoji || '';
        document.getElementById('prod-imagem').value = data.imagem || '';
        editingId = id;
        btnAddProduto.textContent = 'Atualizar Produto';
      } catch (err) {
        alert('Erro ao buscar produto: ' + err.message);
      }
    }

    carregarProdutos('publico');
    setActiveNav('publico');
  </script>
</body>
</html>
